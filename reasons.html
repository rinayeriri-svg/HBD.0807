<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reasons Why You're Amazing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Consistent Indigo Gradient Background */
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 0;
        }

        /* Frosted Glass Container */
        .reasons-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-width: 550px;
            width: 90%;
            animation: fadeIn 1s ease-out;
        }

        /* Header Styling */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            text-align: center;
            margin-top: 0;
            margin-bottom: 2.5rem;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
        }

        /* Reasons List Grid Layout */
        .reasons-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        /* Individual Reason Card */
        .reason-item {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem 1.2rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .reason-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Emoji Icon Wrapper */
        .reason-icon {
            font-size: 1.6rem;
            min-width: 35px;
            text-align: center;
        }

        /* Text Content */
        .reason-text {
            font-size: 1rem;
            font-weight: 400;
            color: #e0e7ff;
            line-height: 1.5;
        }

        /* Modern Navigation Link */
        .nav-wrapper {
            text-align: right;
        }

        .next-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #a5b4fc;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .next-btn:hover {
            color: #ffffff;
            transform: translateX(3px);
        }

        /* Simple entry animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="reasons-container">
        <h1>Reasons Why You're Amazing 💜</h1>
        
        <div class="reasons-list">
            
            <div class="reason-item">
                <span class="reason-icon">💜</span>
                <span class="reason-text">You always know how to make me smile.</span>
            </div>

            <div class="reason-item">
                <span class="reason-icon">✨</span>
                <span class="reason-text">Your kindness makes everyone feel loved.</span>
            </div>

            <div class="reason-item">
                <span class="reason-icon">🌸</span>
                <span class="reason-text">You make every memory unforgettable.</span>
            </div>

            <div class="reason-item">
                <span class="reason-icon">🤍</span>
                <span class="reason-text">You're the most supportive friend anyone could ask for.</span>
            </div>

            <div class="reason-item">
                <span class="reason-icon">🦋</span>
                <span class="reason-text">You inspire me to be a better person every day.</span>
            </div>

            <div class="reason-item">
                <span class="reason-icon">🎀</span>
                <span class="reason-text">You're simply one of a kind.</span>
            </div>

        </div>

        <div class="nav-wrapper">
           <a href="memories.html" class="btn">
Next ➜
</a>
        </div>
    </div>

</body>
</html>



</section>

</body>
</html>
